<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:," />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatRoom API Tester</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── header ── */
    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3748;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #90cdf4; white-space: nowrap; }

    .header-field { display: flex; align-items: center; gap: 8px; }
    .header-field label { font-size: 12px; color: #718096; white-space: nowrap; }
    .header-field input {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #2d3748;
      font-size: 13px;
      background: #0f1117;
      color: #e2e8f0;
    }
    .header-field input:focus { outline: none; border-color: #4299e1; }
    #urlInput  { width: 220px; }
    #jwtToken  { width: 280px; }

    .header-hint { font-size: 12px; color: #4a5568; margin-left: auto; }

    /* ── layout ── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
      flex: 1;
      min-height: 0;
    }

    /* ── chat panel ── */
    .chat-panel {
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 600px;
    }

    .chat-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2d3748;
      background: #171923;
    }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .avatar-student { background: #2b6cb0; }
    .avatar-tutor   { background: #276749; }

    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
    .chat-header-sub  { font-size: 11px; color: #718096; }

    .status-pill {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      background: #2d3748; color: #718096;
      transition: all 0.3s;
    }
    .status-pill.online { background: #1c4532; color: #68d391; }

    .btn-conn {
      padding: 5px 12px; border: none; border-radius: 20px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-conn:hover { opacity: 0.8; }
    .btn-conn.connect    { background: #2b6cb0; color: #fff; }
    .btn-conn.disconnect { background: #742a2a; color: #fc8181; }

    /* ── messages ── */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      background: #0f1117;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }

    .msg-row { display: flex; gap: 8px; max-width: 85%; }
    .msg-row.self  { align-self: flex-end;   flex-direction: row-reverse; }
    .msg-row.other { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      flex-shrink: 0; align-self: flex-end;
    }

    .msg-content { display: flex; flex-direction: column; gap: 2px; }
    .msg-row.self  .msg-content { align-items: flex-end; }
    .msg-row.other .msg-content { align-items: flex-start; }

    .msg-sender { font-size: 10px; color: #4a5568; padding: 0 4px; }

    .bubble {
      padding: 8px 12px; border-radius: 16px;
      font-size: 13px; line-height: 1.5;
      word-break: break-word; max-width: 100%;
    }
    .msg-row.self  .bubble { background: #2b6cb0; color: #fff; border-bottom-right-radius: 4px; }
    .msg-row.other .bubble { background: #2d3748; color: #e2e8f0; border-bottom-left-radius: 4px; }
    .bubble a { color: #90cdf4; text-decoration: underline; }
    .msg-row.self .bubble a { color: #bee3f8; }
    .bubble.media { background: transparent !important; padding: 4px; }

    .msg-time { font-size: 10px; color: #4a5568; padding: 0 4px; }

    /* ── media elements ── */
    .sticker-img { width: 100px; height: 100px; object-fit: contain; display: block; }
    .chat-img    { max-width: 220px; max-height: 180px; border-radius: 8px; cursor: pointer; display: block; object-fit: cover; transition: opacity 0.2s; }
    .chat-img:hover { opacity: 0.85; }
    .chat-audio  { width: 220px; height: 40px; display: block; }
    .chat-video  { max-width: 240px; border-radius: 8px; display: block; }

    /* ── file upload button ── */
    .btn-upload {
      flex-shrink: 0;
      padding: 0 10px; height: 36px;
      background: #2d3748; color: #a0aec0;
      border: 1px solid #4a5568; border-radius: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .btn-upload:hover   { background: #4a5568; color: #e2e8f0; }
    .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── file message card ── */
    .chat-file {
      display: flex; align-items: center; gap: 8px;
      background: #2d3748; border-radius: 8px; padding: 8px 12px;
      color: #e2e8f0; text-decoration: none;
      border: 1px solid #4a5568; max-width: 220px;
      transition: background 0.2s;
    }
    .chat-file:hover { background: #4a5568; }
    .chat-file-name  { font-size: 12px; word-break: break-all; }

    /* ── system message ── */
    .sys-msg {
      align-self: center;
      background: #1a1d2e; color: #4a5568;
      font-size: 12px; padding: 4px 12px; border-radius: 12px;
      border: 1px solid #2d3748;
    }

    /* ── input area ── */
    .chat-input-area {
      border-top: 1px solid #2d3748;
      padding: 10px;
      display: flex; flex-direction: column; gap: 8px;
      background: #171923;
    }
    .input-options { display: flex; gap: 8px; align-items: center; }
    .input-options select {
      padding: 4px 8px; border: 1px solid #2d3748; border-radius: 6px;
      font-size: 12px; color: #e2e8f0; background: #0f1117;
    }
    .type-label { font-size: 12px; color: #718096; white-space: nowrap; }

    .input-row { display: flex; gap: 8px; }
    .msg-input {
      flex: 1; padding: 8px 12px;
      border: 1px solid #2d3748; border-radius: 20px;
      font-size: 13px; color: #e2e8f0; background: #0f1117;
      outline: none; transition: border-color 0.2s;
    }
    .msg-input:focus { border-color: #4299e1; }
    .msg-input::placeholder { color: #4a5568; }

    .media-input {
      flex: 1; padding: 6px 10px;
      border: 1px solid #2d3748; border-radius: 6px;
      font-size: 12px; color: #e2e8f0; background: #0f1117; outline: none;
    }
    .media-input:focus { border-color: #4299e1; }

    .btn-send {
      padding: 8px 18px; background: #2b6cb0; color: #fff;
      border: none; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s; white-space: nowrap;
    }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:active { transform: scale(0.97); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .event-btns { display: flex; gap: 6px; }
    .btn-event {
      padding: 4px 10px; border: none; border-radius: 20px;
      font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .btn-join  { background: #1c4532; color: #68d391; }
    .btn-leave { background: #742a2a; color: #fc8181; }

    /* ── log panel ── */
    .log-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px; cursor: pointer; user-select: none;
      font-size: 11px; color: #4a5568;
      border-top: 1px solid #2d3748; background: #171923;
    }
    .log-toggle:hover { color: #718096; }
    .log-area { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: #0a0c14; }
    .log-area.open { max-height: 160px; overflow-y: auto; }
    .log-area::-webkit-scrollbar { width: 4px; }
    .log-area::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }
    .log-line {
      padding: 2px 12px; font-family: monospace;
      font-size: 11px; line-height: 1.6; color: #4a5568;
      white-space: pre-wrap; word-break: break-all;
    }
    .log-line.in  { color: #63b3ed; }
    .log-line.out { color: #68d391; }
    .log-line.sys { color: #b794f4; }
    .log-line.err { color: #fc8181; }

    /* ── link preview card ── */
    .link-preview {
      margin-top: 8px; border-radius: 10px; overflow: hidden;
      border: 1px solid #2d3748; max-width: 300px;
      background: #1a1d2e; cursor: pointer; display: block;
      text-decoration: none; transition: border-color 0.2s;
    }
    .link-preview:hover { border-color: #4299e1; }
    .link-preview-thumb { width: 100%; max-height: 160px; object-fit: cover; display: block; background: #0f1117; }
    .link-preview-thumb.yt { aspect-ratio: 16/9; }
    .link-preview-meta { padding: 8px 10px; }
    .link-preview-title {
      font-size: 12px; font-weight: 600; color: #e2e8f0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }
    .link-preview-desc {
      font-size: 11px; color: #718096;
      display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .link-preview-domain { font-size: 10px; color: #4a5568; margin-top: 4px; }
    .inline-img-preview {
      margin-top: 6px; max-width: 300px; max-height: 200px;
      border-radius: 8px; display: block; object-fit: cover;
      cursor: pointer; transition: opacity 0.2s;
    }
    .inline-img-preview:hover { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <h1>ChatRoom API Tester</h1>
  <div class="header-field">
    <label>Booking ID</label>
    <input id="bookingId" type="number" value="1" min="1" style="width:80px" />
  </div>
  <div class="header-field">
    <label>WebSocket URL</label>
    <input id="urlInput" type="text" value="http://localhost:8080/ws" />
  </div>
  <div class="header-field">
    <label>JWT Token</label>
    <input id="jwtToken" type="text" placeholder="Bearer token（選填）" />
  </div>
  <span class="header-hint">兩個面板共用同一房間，模擬學生與導師即時對話</span>
</header>

<div class="columns" id="columns"></div>

<script>
// ─────────────────────────────────────────────
// 常數
// ─────────────────────────────────────────────
const ROLE       = { A: 'student', B: 'tutor' };
const ROLE_INT   = { A: 1, B: 2 };
const ROLE_NAME  = { 'student': '學生', 'tutor': '導師', 1: '學生', 2: '導師' };
const TYPE_NAME  = { 1: 'TEXT', 2: 'STICKER', 3: 'VOICE', 4: 'IMAGE', 5: 'VIDEO', 6: 'FILE' };
const MEDIA_TYPES = new Set([2, 3, 4, 5, 6]);

const state = { A: { client: null }, B: { client: null } };

// ─────────────────────────────────────────────
// 建立面板（消除重複 HTML）
// ─────────────────────────────────────────────
function createPanel(p) {
  const roleNum   = ROLE[p];
  const roleName  = ROLE_NAME[roleNum];
  const avatarCls = p === 'A' ? 'avatar-student' : 'avatar-tutor';
  const avatarLtr = p === 'A' ? 'S' : 'T';

  const panel = document.createElement('div');
  panel.className = 'chat-panel';
  panel.id = 'panel' + p;
  panel.innerHTML = `
    <div class="chat-header">
      <div class="avatar ${avatarCls}">${avatarLtr}</div>
      <div class="chat-header-info">
        <div class="chat-header-name">${roleName} (role=${roleNum})</div>
        <div class="chat-header-sub">用戶端 ${p}</div>
      </div>
      <span class="status-pill" id="pill${p}">離線</span>
      <button class="btn-conn connect"    onclick="connect('${p}')">連線</button>
      <button class="btn-conn disconnect" onclick="disconnect('${p}')">斷線</button>
    </div>

    <div class="chat-messages" id="msgs${p}">
      <div class="sys-msg">請先點擊「連線」加入聊天室</div>
    </div>

    <div class="chat-input-area">
      <div class="input-options">
        <span class="type-label" id="typeHint${p}">類型：自動偵測</span>
        <div class="event-btns">
          <button class="btn-event btn-join"  onclick="sendEvent('${p}','joined')">加入房間</button>
          <button class="btn-event btn-leave" onclick="sendEvent('${p}','left')">離開房間</button>
        </div>
      </div>
      <div class="input-row">
        <input class="msg-input" id="input${p}" type="text"
               placeholder="輸入文字或貼上媒體 URL，自動判斷類型…"
               onkeydown="if(event.key==='Enter') sendChat('${p}')"
               oninput="updateTypeHint('${p}')" />
        <input type="file" id="fileInput${p}" style="display:none"
               onchange="onFileSelected('${p}', this)" />
        <button class="btn-upload" id="uploadBtn${p}" title="上傳檔案"
                onclick="document.getElementById('fileInput${p}').click()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <button class="btn-send" onclick="sendChat('${p}')">傳送</button>
      </div>
    </div>

    <div class="log-toggle" onclick="toggleLog('${p}')">
      <span id="logArrow${p}">▶</span> 原始訊息日誌
      <span style="margin-left:auto" onclick="event.stopPropagation();clearLog('${p}')">清除</span>
    </div>
    <div class="log-area" id="log${p}"></div>
  `;
  return panel;
}

document.getElementById('columns').append(createPanel('A'), createPanel('B'));

// ─────────────────────────────────────────────
// 輔助
// ─────────────────────────────────────────────
function bookingId() { return document.getElementById('bookingId').value; }
function wsUrl()     { return document.getElementById('urlInput').value; }
function jwtToken()  { return document.getElementById('jwtToken').value.trim(); }

function setPill(p, online) {
  const pill = document.getElementById('pill' + p);
  pill.textContent = online ? '線上' : '離線';
  pill.className   = 'status-pill' + (online ? ' online' : '');
}

function addSys(panel, text) {
  const box = document.getElementById('msgs' + panel);
  const el  = document.createElement('div');
  el.className   = 'sys-msg';
  el.textContent = text;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function rawLog(p, type, text) {
  const box  = document.getElementById('log' + p);
  const time = new Date().toLocaleTimeString('zh-TW', { hour12: false });
  const line = document.createElement('div');
  line.className   = `log-line ${type}`;
  line.textContent = `[${time}] ${text}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function clearLog(p)  { document.getElementById('log' + p).innerHTML = ''; }

function toggleLog(p) {
  const area  = document.getElementById('log' + p);
  const arrow = document.getElementById('logArrow' + p);
  arrow.textContent = area.classList.toggle('open') ? '▼' : '▶';
}

// ─────────────────────────────────────────────
// 自動偵測訊息類型
// ─────────────────────────────────────────────
const IMG_EXTS   = /\.(jpe?g|png|gif|webp|bmp|svg|ico)(\?.*)?$/i;
const VIDEO_EXTS = /\.(mp4|webm|mov|avi|mkv)(\?.*)?$/i;
const AUDIO_EXTS = /\.(mp3|wav|ogg|aac|flac|m4a)(\?.*)?$/i;
const URL_PATTERN = /^(https?:\/\/.+|\/\S+)/i;

function autoDetectType(text) {
  if (!URL_PATTERN.test(text)) return 1; // TEXT
  if (IMG_EXTS.test(text))     return 4; // IMAGE
  if (VIDEO_EXTS.test(text))   return 5; // VIDEO
  if (AUDIO_EXTS.test(text))   return 3; // VOICE
  return 1;                              // 非媒體 URL → TEXT
}

const TYPE_HINT_MAP = { 1: '文字 TEXT', 2: '貼圖 STICKER', 3: '語音 VOICE', 4: '圖片 IMAGE', 5: '影片 VIDEO', 6: '檔案 FILE' };

function updateTypeHint(p) {
  const val  = document.getElementById('input' + p).value.trim();
  const type = val ? autoDetectType(val) : 0;
  const hint = document.getElementById('typeHint' + p);
  hint.textContent = type ? `類型：${TYPE_HINT_MAP[type]}` : '類型：自動偵測';
}

// ─────────────────────────────────────────────
// WebSocket 連線
// ─────────────────────────────────────────────
function connect(p) {
  if (state[p].client?.connected) { addSys(p, '已連線中'); return; }

  const client = Stomp.over(new SockJS(wsUrl()));
  client.debug = null;
  state[p].client = client;

  const headers = {};
  const token = jwtToken();
  if (token) headers['Authorization'] = 'Bearer ' + token;

  client.connect(headers, () => {
    setPill(p, true);
    addSys(p, `已連線 → ${wsUrl()}  (Booking ${bookingId()})`);
    rawLog(p, 'sys', `CONNECTED ${wsUrl()}`);

    const bid = bookingId();

    client.subscribe(`/topic/room/${bid}/chat`, (frame) => {
      rawLog(p, 'in', frame.body);
      const msg = JSON.parse(frame.body);
      renderMessage(p, msg);
    });

    client.subscribe(`/topic/room/${bid}/events`, (frame) => {
      rawLog(p, 'in', frame.body);
      const ev  = JSON.parse(frame.body);
      const who = ROLE_NAME[ev.role] || `role=${ev.role}`;
      addSys(p, `${who} ${ev.type === 'joined' ? '加入' : '離開'}了房間`);
    });

    client.subscribe(`/topic/room/${bid}/errors`, (frame) => {
      rawLog(p, 'err', frame.body);
      const err = JSON.parse(frame.body);
      addSys(p, `[錯誤] ${err.code}: ${err.message}`);
    });

  }, (err) => {
    setPill(p, false);
    rawLog(p, 'err', `連線失敗: ${err}`);
    addSys(p, `連線失敗: ${err}`);
  });
}

function disconnect(p) {
  if (state[p].client?.connected) {
    state[p].client.disconnect(() => {
      setPill(p, false);
      addSys(p, '已斷線');
      rawLog(p, 'sys', 'DISCONNECTED');
    });
  }
}

// ─────────────────────────────────────────────
// 傳送訊息
// ─────────────────────────────────────────────
function sendChat(p) {
  if (!state[p].client?.connected) { addSys(p, '請先連線'); return; }

  const inputVal = document.getElementById('input' + p).value.trim();
  if (!inputVal) return;

  const type     = autoDetectType(inputVal);
  const isMedia  = MEDIA_TYPES.has(type);
  const message  = isMedia ? '' : inputVal;
  const mediaUrl = isMedia ? inputVal : '';

  const payload  = { bookingId: parseInt(bookingId()), role: ROLE[p], messageType: type, message, mediaUrl };

  state[p].client.send(`/app/chat/${bookingId()}`, {}, JSON.stringify(payload));
  rawLog(p, 'out', JSON.stringify(payload));

  document.getElementById('input' + p).value = '';
  updateTypeHint(p);
}

function sendEvent(p, type) {
  if (!state[p].client?.connected) { addSys(p, '請先連線'); return; }
  const payload = { type, role: ROLE_INT[p] };
  state[p].client.send(`/app/event/${bookingId()}`, {}, JSON.stringify(payload));
  rawLog(p, 'out', JSON.stringify(payload));
}

// ─────────────────────────────────────────────
// 檔案上傳（REST multipart → /api/chatMessage/upload）
// ─────────────────────────────────────────────
function onFileSelected(p, input) {
  const file = input.files[0];
  if (!file) return;
  input.value = ''; // reset，允許重複選同一檔案
  uploadFile(p, file);
}

function detectLocalType(file) {
  const t = file.type || '';
  if (t.startsWith('image/')) return 4;
  if (t.startsWith('video/')) return 5;
  if (t.startsWith('audio/')) return 3;
  return 6;
}

async function uploadFile(p, file) {
  const btn = document.getElementById('uploadBtn' + p);
  btn.disabled = true;

  // 讀取輸入框中的文字，作為附帶訊息一併上傳
  const inputEl = document.getElementById('input' + p);
  const textMsg = inputEl.value.trim();

  addSys(p, `上傳中：${file.name}…`);
  rawLog(p, 'out', `UPLOAD ${file.name} (${file.size} bytes)` + (textMsg ? ` msg="${textMsg}"` : ''));

  // 立即用本地 Blob URL 顯示預覽縮圖（不需等待伺服器回應）
  const localType = detectLocalType(file);
  const blobUrl   = URL.createObjectURL(file);
  const previewMsg = { role: ROLE[p], messageType: localType, mediaUrl: blobUrl, message: textMsg || file.name };
  renderMessage(p, previewMsg);
  renderMessage(p === 'A' ? 'B' : 'A', previewMsg);

  const form = new FormData();
  form.append('file', file);
  form.append('bookingId', bookingId());
  form.append('role', ROLE[p]);
  if (textMsg) form.append('message', textMsg);

  const headers = {};
  const token = jwtToken();
  if (token) headers['Authorization'] = 'Bearer ' + token;

  try {
    const res  = await fetch('/api/chatMessage/upload', { method: 'POST', headers, body: form });
    const data = await res.json();

    if (!res.ok) {
      addSys(p, `上傳失敗: ${data.msg || data.message || res.status}`);
      rawLog(p, 'err', JSON.stringify(data));
      return;
    }

    rawLog(p, 'in', JSON.stringify(data));
    addSys(p, `上傳成功：${file.name}`);
    inputEl.value = '';
    updateTypeHint(p);
  } catch (e) {
    addSys(p, `上傳錯誤: ${e.message}`);
    rawLog(p, 'err', String(e));
  } finally {
    URL.revokeObjectURL(blobUrl);
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────────
// 渲染聊天氣泡（DOM 操作，避免 XSS）
// ─────────────────────────────────────────────
const LINKIFY_RE = /(https?:\/\/[^\s<]+)/gi;

function linkifyText(text, container) {
  const parts = text.split(LINKIFY_RE);
  let firstUrl = null;
  for (const part of parts) {
    LINKIFY_RE.lastIndex = 0;
    if (LINKIFY_RE.test(part)) {
      LINKIFY_RE.lastIndex = 0;
      const a = document.createElement('a');
      a.href = part;
      a.textContent = part;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      container.appendChild(a);
      if (!firstUrl) firstUrl = part;
    } else if (part) {
      container.appendChild(document.createTextNode(part));
    }
    LINKIFY_RE.lastIndex = 0;
  }
  if (firstUrl) appendUrlPreview(firstUrl, container);
}

// ─────────────────────────────────────────────
// URL 預覽卡片
// ─────────────────────────────────────────────
const YT_RE      = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/;
const IMG_URL_RE = /\.(jpe?g|png|gif|webp)(\?[^\s]*)?$/i;

function extractYouTubeId(url) { const m = YT_RE.exec(url); return m ? m[1] : null; }
function isDirectImageUrl(url) { return IMG_URL_RE.test(url); }

function buildYouTubePreview(url, videoId) {
  const a = document.createElement('a');
  a.className = 'link-preview';
  a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';

  const img = document.createElement('img');
  img.className = 'link-preview-thumb yt';
  img.alt = 'YouTube thumbnail';
  img.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
  img.onerror = function() { this.closest('.link-preview').remove(); };

  const meta = document.createElement('div');
  meta.className = 'link-preview-meta';
  const domain = document.createElement('div');
  domain.className = 'link-preview-domain';
  domain.textContent = 'youtube.com';
  meta.appendChild(domain);

  a.append(img, meta);
  return a;
}

function buildInlineImagePreview(url) {
  const img = document.createElement('img');
  img.className = 'inline-img-preview';
  img.alt = '圖片預覽'; img.title = '點擊查看原圖'; img.src = url;
  img.onerror = function() { this.remove(); };
  img.addEventListener('click', () => window.open(url, '_blank'));
  return img;
}

const previewCache = new Map();

async function buildGenericPreview(url) {
  try {
    let data = previewCache.get(url);
    if (!data) {
      const res = await fetch(`/api/linkPreview?url=${encodeURIComponent(url)}`);
      if (!res.ok) return null;
      data = await res.json();
      previewCache.set(url, data);
    }
    if (!data.title) return null;

    const a = document.createElement('a');
    a.className = 'link-preview';
    a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';

    if (data.imageUrl) {
      const img = document.createElement('img');
      img.className = 'link-preview-thumb';
      img.src = data.imageUrl;
      img.onerror = function() { this.remove(); };
      a.appendChild(img);
    }

    const meta = document.createElement('div');
    meta.className = 'link-preview-meta';

    const title = document.createElement('div');
    title.className = 'link-preview-title';
    title.textContent = data.title;
    meta.appendChild(title);

    if (data.description) {
      const desc = document.createElement('div');
      desc.className = 'link-preview-desc';
      desc.textContent = data.description;
      meta.appendChild(desc);
    }

    const domain = document.createElement('div');
    domain.className = 'link-preview-domain';
    try { domain.textContent = new URL(url).hostname; } catch(_) { domain.textContent = url; }
    meta.appendChild(domain);

    a.appendChild(meta);
    return a;
  } catch(_) { return null; }
}

async function appendUrlPreview(url, container) {
  const ytId = extractYouTubeId(url);
  if (ytId) { container.appendChild(buildYouTubePreview(url, ytId)); return; }
  if (isDirectImageUrl(url)) { container.appendChild(buildInlineImagePreview(url)); return; }
  const card = await buildGenericPreview(url);
  if (card) container.appendChild(card);
}

function createMediaElement(msg) {
  const url = msg.mediaUrl || '';
  switch (msg.messageType) {
    case 2: {
      const el = document.createElement('img');
      el.className = 'sticker-img'; el.alt = '貼圖'; el.src = url;
      return el;
    }
    case 3: {
      const el = document.createElement('audio');
      el.className = 'chat-audio'; el.controls = true; el.src = url;
      return el;
    }
    case 4: {
      const el = document.createElement('img');
      el.className = 'chat-img'; el.alt = '圖片'; el.title = '點擊查看原圖';
      el.src = url;
      el.onerror = function() { this.alt = '圖片載入失敗'; this.style.border = '1px dashed #4a5568'; };
      el.addEventListener('click', () => window.open(url, '_blank'));
      return el;
    }
    case 5: {
      const el = document.createElement('video');
      el.className = 'chat-video'; el.controls = true; el.preload = 'auto'; el.muted = true;
      el.src = url;
      // 確保瀏覽器載入後自動顯示第一幀作為縮圖
      el.addEventListener('loadeddata', function() { this.currentTime = 0.1; });
      return el;
    }
    case 6: {
      const storedName = url.split('/').pop() || '';
      const originalName = msg.message || storedName || '下載檔案';
      const downloadUrl = `/api/chatMessage/download/${encodeURIComponent(storedName)}?name=${encodeURIComponent(originalName)}`;
      const a = document.createElement('a');
      a.className = 'chat-file'; a.href = downloadUrl; a.download = originalName;

      const icon = document.createElement('span');
      icon.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';

      const name = document.createElement('span');
      name.className = 'chat-file-name'; name.textContent = originalName;

      a.append(icon, name);
      return a;
    }
    default: return null;
  }
}

function renderMessage(panel, msg) {
  const box     = document.getElementById('msgs' + panel);
  const isSelf  = msg.role === ROLE[panel];
  const isMedia = MEDIA_TYPES.has(msg.messageType);

  const row = document.createElement('div');
  row.className = `msg-row ${isSelf ? 'self' : 'other'}`;

  const avatar = document.createElement('div');
  avatar.className   = `msg-avatar ${msg.role === 'student' ? 'avatar-student' : 'avatar-tutor'}`;
  avatar.textContent = msg.role === 'student' ? 'S' : 'T';

  const content = document.createElement('div');
  content.className = 'msg-content';

  const sender = document.createElement('span');
  sender.className   = 'msg-sender';
  sender.textContent = ROLE_NAME[msg.role] || `role=${msg.role}`;

  const isFile = msg.messageType === 6;

  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isMedia && !isFile ? ' media' : '');

  if (isMedia || isFile) {
    const mediaEl = createMediaElement(msg);
    if (mediaEl) bubble.appendChild(mediaEl);
    else bubble.textContent = `[${TYPE_NAME[msg.messageType] || msg.messageType}] ${msg.mediaUrl || ''}`;
    // 顯示附帶的文字訊息（排除純檔名）
    if (msg.message && msg.message.trim()) {
      const caption = document.createElement('div');
      caption.style.cssText = 'margin-top:6px;font-size:13px;line-height:1.4;color:#e2e8f0;';
      caption.textContent = msg.message;
      bubble.appendChild(caption);
    }
  } else {
    linkifyText(msg.message || '', bubble);
  }

  const timeStr = msg.createdAt
    ? new Date(msg.createdAt).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false })
    : new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });

  const time = document.createElement('span');
  time.className   = 'msg-time';
  time.textContent = timeStr + (msg.id ? ` · #${msg.id}` : '');

  content.append(sender, bubble, time);
  row.append(avatar, content);

  const hint = box.querySelector('.sys-msg');
  if (hint?.textContent.includes('請先點擊')) hint.remove();

  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}
